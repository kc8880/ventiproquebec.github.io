<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentiPro Québec</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:radial-gradient(circle,#0b1b2a,#050b14);
color:white;
}

#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

h1{
font-size:2.8rem;
letter-spacing:1px;
}

p{opacity:0.8}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

#before{background:#555;color:white;}
#after{background:#00c8ff;color:white;}
#after:hover{transform:scale(1.05);}
#before:hover{transform:scale(1.05);}
</style>
</head>

<body>

<div id="ui">
<h1>Nettoyage de Ventilation</h1>
<p>Montréal • Laval • Rive-Nord</p>
<button id="before">Système encrassé</button>
<button id="after">Après nettoyage</button>
</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* SCENE */
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,0,7);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#c"),
alpha:true,
antialias:true
});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

/* LIGHT (premium look) */
scene.add(new THREE.AmbientLight(0xffffff,1.2));

const light = new THREE.DirectionalLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

/* HVAC PIPE (metal look) */
const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(1.2,1.2,5,64),
new THREE.MeshStandardMaterial({
color:0xb0b0b0,
metalness:0.9,
roughness:0.25
})
);
pipe.rotation.z = Math.PI/2;
scene.add(pipe);

/* DUST (more realistic spread) */
const count = 400;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3] = (Math.random()-0.5)*5;
pos[i*3+1] = (Math.random()-0.5)*1.5;
pos[i*3+2] = (Math.random()-0.5)*1.5;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({
color:0x888888,
size:0.04,
transparent:true,
opacity:0.7
});

const dust = new THREE.Points(geo,mat);
scene.add(dust);

/* STATE */
let dirty = 1;

document.querySelector("#before").onclick=()=>dirty=1;
document.querySelector("#after").onclick=()=>dirty=0;

/* LOOP */
function animate(){
requestAnimationFrame(animate);

const p = geo.attributes.position.array;

for(let i=0;i<count;i++){
p[i*3] += 0.015 + dirty*0.05;
if(p[i*3] > 2.5) p[i*3] = -2.5;
}

geo.attributes.position.needsUpdate = true;

pipe.rotation.y += 0.0015;
pipe.rotation.x += 0.001;

renderer.render(scene,camera);
}

animate();

/* RESIZE */
addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
