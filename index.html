<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentiPro Québec | HVAC Cleaning</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050b14;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

#c{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.overlay{
position:relative;
z-index:2;
max-width:700px;
padding:20px;
}

h1{
font-size:3.2rem;
margin-bottom:10px;
}

p{
opacity:0.8;
font-size:1.1rem;
margin-bottom:20px;
}

.btn{
padding:14px 26px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
background:#00c8ff;
color:black;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* SECTION */
.section{
padding:80px 20px;
max-width:1000px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0d1b2a;
padding:20px;
border-radius:15px;
border:1px solid #1d3557;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

<canvas id="c"></canvas>

<div class="overlay">
<h1>Nettoyage de ventilation</h1>
<p>Service professionnel à Montréal & Laval — résidentiel et commercial</p>
<button class="btn" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
Demander une soumission
</button>
</div>

</div>

<!-- SERVICES -->
<div class="section">
<h2>Nos services</h2>

<div class="cards">
<div class="card">Nettoyage conduits HVAC résidentiel</div>
<div class="card">Nettoyage sécheuse</div>
<div class="card">Commercial & multi-logements</div>
</div>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
<h2>Contact</h2>
<p>Appel rapide ou soumission gratuite</p>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* SCENE */
const scene = new THREE.Scene();

/* CAMERA */
const camera = new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,1,7);

/* RENDERER */
const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#c"),
alpha:true,
antialias:true
});

renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1.1));

const dir = new THREE.DirectionalLight(0xffffff,2);
dir.position.set(5,5,5);
scene.add(dir);

/* MAIN DUCT (REALISTIC METAL) */
const duct = new THREE.Mesh(
new THREE.CylinderGeometry(1.1,1.1,6,80),
new THREE.MeshStandardMaterial({
color:0xc0c6cc,
metalness:1,
roughness:0.22
})
);
duct.rotation.z = Math.PI/2;
scene.add(duct);

/* INNER FLOW GLOW */
const flow = new THREE.Mesh(
new THREE.CylinderGeometry(0.9,0.9,5.8,80),
new THREE.MeshBasicMaterial({
color:0x00c8ff,
transparent:true,
opacity:0.07
})
);
flow.rotation.z = Math.PI/2;
scene.add(flow);

/* DUST */
const count = 600;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3] = (Math.random()-0.5)*6;
pos[i*3+1] = (Math.random()-0.5)*1.3;
pos[i*3+2] = (Math.random()-0.5)*1.3;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({
color:0x8a8f94,
size:0.025,
transparent:true,
opacity:0.6
});

const dust = new THREE.Points(geo,mat);
scene.add(dust);

/* ANIMATION */
function animate(){
requestAnimationFrame(animate);

duct.rotation.y += 0.0008;
flow.rotation.y += 0.0012;

const p = geo.attributes.position.array;

for(let i=0;i<count;i++){
p[i*3] += 0.008;
if(p[i*3] > 3) p[i*3] = -3;
}

geo.attributes.position.needsUpdate = true;

renderer.render(scene,camera);
}

animate();

/* RESIZE */
addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
