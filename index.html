<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettoyage Ventilation</title>

<style>
body{
margin:0;
overflow:hidden;
background:#050b14;
font-family:Arial;
color:white;
}

#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:25px;
cursor:pointer;
}

#dirty{background:#666;color:white;}
#clean{background:#00c8ff;color:white;}
</style>
</head>

<body>

<div id="ui">
<h1>Ventilation Montréal & Laval</h1>
<p>Avant / Après nettoyage</p>
<button id="dirty">Avant</button>
<button id="clean">Après</button>
</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({canvas:document.querySelector("#c"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.5));

const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(1.5,1.5,6,32),
new THREE.MeshStandardMaterial({color:0x888888,metalness:0.7,roughness:0.3})
);
pipe.rotation.z = Math.PI/2;
scene.add(pipe);

const count = 300;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3]=(Math.random()-0.5)*6;
pos[i*3+1]=(Math.random()-0.5)*2;
pos[i*3+2]=(Math.random()-0.5)*2;
}

geo.setAttribute("position", new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({color:0x999999,size:0.06});
const dust = new THREE.Points(geo,mat);
scene.add(dust);

let level = 1;

document.querySelector("#dirty").onclick=()=>level=1;
document.querySelector("#clean").onclick=()=>level=0;

function animate(){
requestAnimationFrame(animate);

const p = geo.attributes.position.array;

for(let i=0;i<count;i++){
p[i*3] += 0.02 + level*0.05;
if(p[i*3] > 3) p[i*3] = -3;
}

geo.attributes.position.needsUpdate = true;

pipe.rotation.y += 0.002;

renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
