<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nettoyage Ventilation Montréal & Laval</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#050b14;
color:white;
}

#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

button{
padding:12px 25px;
margin:10px;
border-radius:30px;
border:none;
cursor:pointer;
}

#before{background:#555;color:white;}
#after{background:#00c8ff;color:white;}
</style>
</head>

<body>

<div id="ui">
<h1>Nettoyage de Ventilation</h1>
<p>Montréal & Laval</p>

<button id="before">Avant</button>
<button id="after">Après</button>
</div>

<canvas id="c"></canvas>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { gsap } from "https://cdn.jsdelivr.net/npm/gsap@3.12.5/index.js";

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.z=7;

const renderer=new THREE.WebGLRenderer({canvas:document.querySelector("#c"),alpha:true});
renderer.setSize(innerWidth,innerHeight);

scene.add(new THREE.AmbientLight(0xffffff,1.5));

const pipe=new THREE.Mesh(
new THREE.CylinderGeometry(1.5,1.5,6,64),
new THREE.MeshStandardMaterial({color:0x888888,metalness:0.8,roughness:0.3})
);
pipe.rotation.z=Math.PI/2;
scene.add(pipe);

const count=600;
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3]=(Math.random()-0.5)*6;
pos[i*3+1]=(Math.random()-0.5)*2;
pos[i*3+2]=(Math.random()-0.5)*2;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));

const mat=new THREE.PointsMaterial({color:0x999999,size:0.05});
const dust=new THREE.Points(geo,mat);
scene.add(dust);

let level=1;

document.querySelector("#before").onclick=()=>{
gsap.to({v:level},{
v:1,duration:2,
onUpdate(){level=this.targets()[0].v;}
});
};

document.querySelector("#after").onclick=()=>{
gsap.to({v:level},{
v:0,duration:2,
onUpdate(){level=this.targets()[0].v;}
});
};

function animate(){
requestAnimationFrame(animate);

const p=geo.attributes.position.array;

for(let i=0;i<count;i++){
p[i*3]+=0.02+level*0.05;
if(p[i*3]>3)p[i*3]=-3;
}

geo.attributes.position.needsUpdate=true;

pipe.rotation.y+=0.003;

renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
