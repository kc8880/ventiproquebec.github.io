<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VentiPro Québec | Ventilation</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
background:#050b14;
color:white;
}

#ui{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

h1{font-size:2.5rem;margin-bottom:10px;}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

#before{background:#666;color:white;}
#after{background:#00c8ff;color:white;}
</style>
</head>

<body>

<div id="ui">
<h1>Nettoyage Ventilation</h1>
<p>Montréal & Laval</p>
<button id="before">Avant</button>
<button id="after">Après</button>
</div>

<canvas id="scene"></canvas>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

/* SCENE */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector("#scene"),
alpha:true,
antialias:true
});

renderer.setSize(innerWidth,innerHeight);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,1.5));

/* PIPE */
const pipe = new THREE.Mesh(
new THREE.CylinderGeometry(1.3,1.3,5,48),
new THREE.MeshStandardMaterial({
color:0x999999,
metalness:0.8,
roughness:0.3
})
);

pipe.rotation.z = Math.PI/2;
scene.add(pipe);

/* PARTICLES (DUST) */
const count = 250;
const geo = new THREE.BufferGeometry();
const pos = new Float32Array(count*3);

for(let i=0;i<count;i++){
pos[i*3] = (Math.random()-0.5)*5;
pos[i*3+1] = (Math.random()-0.5)*2;
pos[i*3+2] = (Math.random()-0.5)*2;
}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3));

const mat = new THREE.PointsMaterial({
color:0xaaaaaa,
size:0.05
});

const dust = new THREE.Points(geo,mat);
scene.add(dust);

/* STATE */
let level = 1;

document.querySelector("#before").onclick = ()=> level = 1;
document.querySelector("#after").onclick = ()=> level = 0;

/* LOOP */
function animate(){
requestAnimationFrame(animate);

const p = geo.attributes.position.array;

for(let i=0;i<count;i++){
p[i*3] += 0.02 + level*0.04;
if(p[i*3] > 2.5) p[i*3] = -2.5;
}

geo.attributes.position.needsUpdate = true;

pipe.rotation.y += 0.002;

renderer.render(scene,camera);
}

animate();

/* RESIZE FIX */
addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
